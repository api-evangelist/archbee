aid: archbee
name: Archbee
description: >-
  Archbee is a documentation platform for software teams that enables creating,
  managing, and publishing technical documentation, API references, and
  knowledge bases. It provides tools for writing developer docs, API
  documentation, and internal wikis with collaborative editing and version
  control.
